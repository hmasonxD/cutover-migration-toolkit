name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cutover
          POSTGRES_PASSWORD: cutover
          POSTGRES_DB: cutover
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CUTOVER_LEGACY_HOST: localhost
      CUTOVER_LEGACY_PORT: "5432"
      CUTOVER_LEGACY_DB: legacy_muni
      CUTOVER_LEGACY_USER: cutover
      CUTOVER_LEGACY_PASSWORD: cutover
      CUTOVER_CLOUD_HOST: localhost
      CUTOVER_CLOUD_PORT: "5432"
      CUTOVER_CLOUD_DB: catalis_cloud
      CUTOVER_CLOUD_USER: cutover
      CUTOVER_CLOUD_PASSWORD: cutover

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Create databases
        env:
          PGPASSWORD: cutover
        run: |
          psql -h localhost -U cutover -d postgres -c "CREATE DATABASE legacy_muni;"
          psql -h localhost -U cutover -d postgres -c "CREATE DATABASE catalis_cloud;"

      - name: Provision schemas and seed data
        run: python -m scripts.setup_db

      - name: Run test suite
        run: python -m pytest -q
